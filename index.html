<!DOCTYPE html>
<html lang="en" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع القرآن الكريم</title>
    <link rel="shortcut icon" href="images/Qur'an-vector - yaritsu zy.jpeg" type="image/x-icon">
    <link rel="stylesheet" href="css/all.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- font google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&family=Clicker+Script&family=Great+Vibes&family=Jost:ital,wght@0,100..900;1,100..900&family=Mirza:wght@400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body class="bg-[linear-gradient(to_right,#273338,#2B5748,#618764,#9CB080)]">

    <!-- header section -->
    <header
        class="fixed top-0 right-0 z-50 w-full h-16 text-white font-bold text-base lg:text-xl flex 
     justify-between items-center px-4 md:px-10 bg-[linear-gradient(to_left,#273338,#2B5748,#618764,#9CB080)] shadow-xl shadow-black/35">

        <!-- taplet and labtop responsive -->
        <ul class="hidden md:flex gap-10 justify-center items-center">
            <li
                class="hover:bg-white hover:text-[#273338] rounded-xl px-4 py-2 cursor-pointer transition-all duration-300">
                <a href="#main">عرض
                    السور</a>
            </li>

            <li
                class="hover:bg-white hover:text-[#273338] rounded-xl px-4 py-2 cursor-pointer transition-all duration-300">
                <a href="#sec2">بث
                    مباشر</a>
            </li>
            <li
                class="hover:bg-white hover:text-[#273338] rounded-xl px-4 py-2 cursor-pointer transition-all duration-300">
                <a href="#sec3">راديو</a>
            </li>
            <li
                class="hover:bg-white hover:text-[#273338] rounded-xl px-4 py-2 cursor-pointer transition-all duration-300">
                <a href="#sec1">تفسير</a>
            </li>
        </ul>

        <!-- menu in mobile responsive -->
        <div class="flex md:hidden"><i class="fa-solid fa-bars font-bold text-2xl cursor-pointer"></i></div>

        <ul class="menu hidden absolute flex-col bg-[linear-gradient(to_left,#273338,#2B5748,#618764,#9CB080)] 
        rounded-xl p-3 justify-center items-center font-bold text-xl px-10 space-y-4 top-20 right-2">
            <li
                class="hover:bg-white hover:text-[#273338] flex justify-center items-center rounded-xl px-4 py-2 cursor-pointer transition-all duration-300">
                <a href="#main">عرض
                    السور</a>
            </li>

            <li
                class="hover:bg-white hover:text-[#273338] flex justify-center items-center rounded-xl px-4 py-2 cursor-pointer transition-all duration-300">
                <a href="#sec2">بث
                    مباشر</a>
            </li>
            <li
                class="hover:bg-white hover:text-[#273338] flex justify-center items-center rounded-xl px-4 py-2 cursor-pointer transition-all duration-300">
                <a href="#sec3">راديو</a>
            </li>
            <li
                class="hover:bg-white hover:text-[#273338] flex justify-center items-center rounded-xl px-4 py-2 cursor-pointer transition-all duration-300">
                <a href="#sec1">تفسير</a>
            </li>
        </ul>
        <script>
            let menuIcon = document.querySelector(".fa-bars")
            let menu = document.querySelector(".menu")

            menuIcon.addEventListener('click', function () {

                menu.classList.toggle("hidden")
                if (menu.classList.contains("hidden")) {
                    menuIcon.classList.add("fa-bars")
                    menuIcon.classList.remove("fa-xmark")
                }
                else {
                    menuIcon.classList.remove("fa-bars")
                    menuIcon.classList.add("fa-xmark")
                }
            })

        </script>


        <div class="flex justify-center items-center">
            <a href="#" class="flex justify-center items-center">
                <h2 class="font-bold flex justify-center items-center">موقع القرآن الكريم
                    <img src="images/Qur_an-vector_-_yaritsu_zy-removebg-preview.png" class="w-10 h-10 md:w-20 md:h-20"
                        alt="">
                </h2>
            </a>

        </div>

    </header>

    <!-- main section -->
    <main id="main" class="w-full min-h-screen pt-20 flex justify-center items-center bg-fixed
        bg-[url(./images/masjid-pogung-dalangan-DBsQFuIbXg4-unsplash.jpg)] bg-no-repeat bg-cover ">
        <div class="container w-full min-h-screen flex flex-col justify-evenly items-center px-4">
            <div class="flex text-white flex-col justify-center items-center gap-3">
                <p class="text-xl tracking-widest">رحلة طيبة في رحاب </p>
                <span class="text-4xl"><strong>القرآن الكريم</strong></span>
            </div>
            <div
                class="w-full bg-white rounded-xl flex flex-col justify-center items-center gap-4 lg:gap-7 py-6 px-2 lg:px-4">
                <div class="container flex flex-col md:flex-row justify-evenly items-center gap-4 lg:gap-7 py-6">
                    <div class=" flex flex-col gap-4 ">
                        <label class=" text-[#273338] font-bold text-lg">اختر قارئ</label>
                        <div class="relative">
                            <select name="" id="chooseReciters"
                                class="w-56 appearance-none py-1 ring-1 pr-2 ring-[#273338] rounded-lg outline-none cursor-pointer">
                            </select>

                            <i
                                class="fa-solid fa-caret-down absolute text-[#273338] left-3 top-1/2 -translate-y-1/2 pointer-events-none"></i>
                        </div>
                    </div>

                    <div class="flex flex-col gap-4 ">
                        <label class="text-[#273338] font-bold text-lg ">اختر رواية أو مصحف</label>
                        <div class="relative">
                            <select name="" id="chooseRewayah"
                                class="w-56 appearance-none py-1 ring-1 pr-2 ring-[#273338] rounded-lg outline-none cursor-pointer">
                            </select>
                            <i
                                class="fa-solid fa-caret-down absolute text-[#273338] left-3 top-1/2 -translate-y-1/2 pointer-events-none"></i>
                        </div>
                    </div>

                    <div class="flex flex-col gap-4 ">
                        <label class="text-[#273338] font-bold text-lg">اختر سورة</label>
                        <div class="relative">
                            <select name="" id="chooseSurah"
                                class="w-56 appearance-none py-1 ring-1 pr-2 ring-[#273338] rounded-lg outline-none cursor-pointer">
                            </select>
                            <i
                                class="fa-solid fa-caret-down absolute text-[#273338] left-3 top-1/2 -translate-y-1/2 pointer-events-none"></i>
                        </div>
                    </div>
                </div>
                <audio src="" id="playSurah" class="w-72 md:w-96 ring-1 ring-[#273338] rounded-full" controls></audio>
            </div>


        </div>
    </main>

    <!-- first section  -->
    <section id="sec1" class="w-full flex justify-center items-center p-10 scroll-mt-10">
        <div class="container w-full h-60 rounded-xl flex flex-col justify-center items-center gap-6
         bg-[url('images/tafsir.jpeg')]">
            <div>
                <h2 class="font-bold text-2xl text-white">الخلاصة من تفسير الطبري</h2>
            </div>
            <div class="flex flex-col justify-center items-center gap-4 px-5 space-x-4">
                <label class=" font-bold text-lg text-white ">اخترالسورة </label>

                <div class="relative">
                    <select name="" id="chooseTafsir"
                        class="w-56 appearance-none py-1 ring-1 pr-2 ring-[#273338] rounded-lg outline-none cursor-pointer">
                    </select>

                    <i
                        class="fa-solid fa-caret-down absolute text-[#273338] left-3 top-1/2 -translate-y-1/2 pointer-events-none"></i>
                </div>
                <audio src="" id="tafsir" class="w-full md:w-96 ring-1 ring-[#273338] rounded-full" controls></audio>
            </div>
        </div>

    </section>
    <!-- second section -->
    <section id="sec2" class="w-full flex justify-center items-center p-10 scroll-mt-10">
        <div class="container flex flex-col gap-10 justify-center items-center font-bold">
            <h2 class="text-xl text-white">اختر قناة البث المباشر</h2>
            <div class="flex gap-4 text-sm md:text-base">
                <a href="javascript:void(0)" onclick="playLive('https://win.holol.com/live/quran/playlist.m3u8')"
                    class="bg-white text-[#273338] rounded-xl p-2 cursor-pointer hover:shadow-xl hover:shadow-black flex justify-center items-center gap-2">قناة
                    القرآن الكريم <img src="images/building_16183908.png" class="w-10 h-10" alt=""></a>
                <a href="javascript:void(0)" onclick="playLive('https://win.holol.com/live/sunnah/playlist.m3u8')"
                    class="bg-white text-[#273338] rounded-xl p-2 cursor-pointer hover:shadow-xl hover:shadow-black flex justify-center items-center gap-2">قناة
                    السنة النبوية <img src="images/masjid-al-nabawi_16183907.png" class="w-10 h-10" alt=""></a>
            </div>
            <video src="" id="liveVideo" class="w-[600px] h-[300px] rounded-xl shadow-lg shadow-black ring-1 ring-white"
                controls>

            </video>
        </div>

    </section>


    <!-- third section -->
    <section id="sec3" class="w-full  flex justify-center items-center p-10 scroll-mt-10">
        <div class="container h-96 flex justify-center gap-6 items-center py-10 bg-[url('images/abdullah-arif-Dxi6KbpvUgA-unsplash.jpg')] 
        bg-no-repeat bg-cover bg-center rounded-xl px-5">
            <div class="flex flex-col justify-center items-center gap-8 px-5 space-x-4">
                <h2 class="font-bold text-white text-2xl flex justify-center items-center gap-4">إذاعة القرآن الكريم
                    <img src="images\radio_15201444.png" class="w-6 h-6" alt="">
                </h2>
                <label class=" font-bold text-lg text-white ">اختر الإذاعة</label>

                <div class="relative">
                    <select name="" id="chooseReciter"
                        class="w-60 appearance-none py-1 ring-1 pr-2 ring-[#273338] rounded-lg outline-none cursor-pointer">
                    </select>

                    <i
                        class="fa-solid fa-caret-down absolute text-[#273338] left-3 top-1/2 -translate-y-1/2 pointer-events-none"></i>
                </div>
                <audio src="" id="radio" class="w-full md:w-96 ring-1 ring-[#273338] rounded-full" controls></audio>
            </div>
        </div>
    </section>

    <!-- forth section -->
    <section id="sec4" class="w-full  flex justify-center items-center p-10 scroll-mt-10">
        <div class="container w-full h-fit flex justify-center gap-6 items-center py-10 px-4 bg-[url('images/ashkan-forouzani-7blIFp0kFP4-unsplash.jpg')] 
        bg-no-repeat bg-cover rounded-xl">
            <div class="flex flex-col justify-center items-center gap-8">
                <h2 class="font-bold text-white text-base md:text-2xl flex justify-center items-center gap-4">إذاعة
                    القرآن الكريم من
                    القاهرة
                    <img src="images\radio_15201444.png" class="w-6 h-6" alt="">
                </h2>
                <audio src="https://stream.zeno.fm/tv0x28xvyc9uv"
                    class="w-full md:w-96 ring-1 ring-[#273338] rounded-full" id="cairoRadio" controls></audio>
            </div>
        </div>
    </section>



    <script src="js/hls.min.js"></script>

    <script src="js/script.js"></script>
</body>

</html>
